<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ambient Loop Player</title>

<style>

:root{
    --bg:#1d2630;
    --panel:#2d3845;
    --accent:#4CAF50;
    --danger:#d9534f;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:white;
    font-family:Segoe UI,Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.player{

    width:360px;
    background:var(--panel);
    border-radius:16px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);

}

h1{

    margin:0 0 18px;
    text-align:center;
    font-size:28px;

}

select,
button,
input[type=range]{

    width:100%;
    margin-top:12px;

}

button{

    border:none;
    border-radius:8px;
    padding:11px;
    font-size:15px;
    cursor:pointer;

}

.play{

    background:var(--accent);
    color:white;

}

.stop{

    background:var(--danger);
    color:white;

}

label{

    display:block;
    margin-top:18px;

}

small{

    display:block;
    margin-top:18px;
    color:#c8d0d8;
    text-align:center;
    line-height:1.4;

}

#timerStatus{

    margin-top:8px;
    color:#9dd3ff;
    font-size:13px;
    text-align:center;

}

</style>
</head>

<body>

<div class="player">

<h1>Ambient Loop Player</h1>

<select id="trackList"></select>

<button class="play">▶ Play</button>

<button class="stop">■ Stop</button>

<label>
Volume
<input id="volume"
type="range"
min="0"
max="1"
step="0.01"
value="1">
</label>

<label>
Sleep Timer

<select id="sleepTimer">

<option value="0">Off</option>
<option value="5">5 minutes</option>
<option value="10">10 minutes</option>
<option value="15">15 minutes</option>
<option value="30">30 minutes</option>
<option value="45">45 minutes</option>
<option value="60">60 minutes</option>
<option value="90">90 minutes</option>
<option value="120">120 minutes</option>

</select>

</label>

<div id="timerStatus"></div>

<small>

All sounds © 2026, Enes Deniz.

</small>

</div>


<script src="sounds.js"></script>

<script>

const list = document.getElementById("trackList");
const playBtn = document.querySelector(".play");
const stopBtn = document.querySelector(".stop");
const volume = document.getElementById("volume");
const timer = document.getElementById("sleepTimer");
const timerStatus = document.getElementById("timerStatus");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const gainNode = audioCtx.createGain();
gainNode.connect(audioCtx.destination);

gainNode.gain.value = Number(volume.value);

let currentBuffer = null;
let currentSource = null;
let currentTrack = null;
let isPlaying = false;
let sleepTimeout = null;

const FADE_TIME = 1.2; // seconds

async function loadTrack(url) {

    if (currentTrack === url && currentBuffer)
        return;

    const response = await fetch(url);

    const arrayBuffer = await response.arrayBuffer();

    currentBuffer = await audioCtx.decodeAudioData(arrayBuffer);

    currentTrack = url;

}

function createSource() {

    const source = audioCtx.createBufferSource();

    source.buffer = currentBuffer;

    source.loop = true;

    source.loopStart = 0;

    source.loopEnd = currentBuffer.duration;

    source.connect(gainNode);

    return source;

}

function fadeGain(target) {

    const now = audioCtx.currentTime;

    gainNode.gain.cancelScheduledValues(now);

    gainNode.gain.setValueAtTime(gainNode.gain.value, now);

    gainNode.gain.linearRampToValueAtTime(target, now + FADE_TIME);

}

async function playTrack() {

    if (audioCtx.state === "suspended")
        await audioCtx.resume();

    await loadTrack(list.value);

    if (isPlaying)
        return;

    currentSource = createSource();

    gainNode.gain.value = 0;

    currentSource.start();

    fadeGain(Number(volume.value));

    isPlaying = true;

}

function stopTrack() {

    if (!isPlaying)
        return;

    fadeGain(0);

    setTimeout(() => {

        if (currentSource) {

            currentSource.stop();

            currentSource.disconnect();

            currentSource = null;

        }

        isPlaying = false;

    }, FADE_TIME * 1000);

}

async function switchTrack() {

    const playing = isPlaying;

    if (playing) {

        fadeGain(0);

        await new Promise(r => setTimeout(r, FADE_TIME * 1000));

        currentSource.stop();

        currentSource.disconnect();

        currentSource = null;

    }

    await loadTrack(list.value);

    if (playing) {

        currentSource = createSource();

        gainNode.gain.value = 0;

        currentSource.start();

        fadeGain(Number(volume.value));

    }

}

sounds.forEach(file => {

    const option = document.createElement("option");

    option.value = file;

    option.textContent = file.replace(/\.[^/.]+$/, "");

    list.appendChild(option);

});

list.value = sounds[0];

volume.oninput = () => {

    const now = audioCtx.currentTime;

    gainNode.gain.cancelScheduledValues(now);

    gainNode.gain.setValueAtTime(gainNode.gain.value, now);

    gainNode.gain.linearRampToValueAtTime(
        Number(volume.value),
        now + 0.05
    );

};

playBtn.onclick = playTrack;

stopBtn.onclick = stopTrack;

list.onchange = switchTrack;

timer.onchange = () => {

    clearTimeout(sleepTimeout);

    timerStatus.textContent = "";

    if (timer.value === "0")
        return;

    timerStatus.textContent =
        "Sleep timer: " + timer.value + " minute(s)";

    sleepTimeout = setTimeout(() => {

        timerStatus.textContent = "Sleep timer finished.";

        stopTrack();

    }, Number(timer.value) * 60000);

};

</script>

</body>
</html>
